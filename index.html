<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>大咖原料仓出库计算器</title>
<style>
*{box-sizing:border-box}
body{font-family:system-ui; background:#f4f6f8; padding:16px; max-width:400px; margin:auto}
.card{background:white; border-radius:12px; padding:16px; box-shadow:0 2px 8px #0001}
h2{text-align:center; margin:0 0 12px}
.label{font-size:14px; color:#555; margin:8px 0 4px}
input{width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:16px}
.btn{width:100%; padding:12px; background:#007aff; color:white; border:none; border-radius:8px; margin:16px 0; font-size:16px}
.res{margin-top:12px; padding:12px; background:#eef7ff; border-radius:8px; line-height:1.6}
.choice{margin:10px 0; display:flex; gap:12px; font-size:15px}

.tab-wrap{display:flex; margin-bottom:12px; border-radius:8px; overflow:hidden; border:1px solid #ddd}
.tab{flex:1; padding:8px; text-align:center; cursor:pointer; background:#f1f1f1}
.tab.active{background:#007aff; color:white}
.tab-content{display:none}
.tab-content.active{display:block}

.zero-item{display:flex; gap:6px; margin:6px 0}
.zero-item input{flex:1}
.del{background:#ff3b30;color:white;border:none;border-radius:6px;padding:0 8px}
.add-line{background:#34c759;color:white;border:none;border-radius:8px;padding:6px;width:100%;margin:6px 0}
</style>
</head>
<body>
<div class="card">
  <h2>大咖原料仓计算器</h2>

  <div class="tab-wrap">
    <div class="tab active" data-target="outStock">出库托数计算</div>
    <div class="tab" data-target="divCalc">商数余数计算</div>
  </div>

  <div id="outStock" class="tab-content active">
    <div class="choice">
      <label><input type="radio" name="type" value="box" checked> 按箱数计算</label>
      <label><input type="radio" name="type" value="kg"> 按千克数计算</label>
    </div>

    <div id="boxArea">
      <div class="label">所需箱数</div>
      <input id="box" type="number" placeholder="例如 490">

      <div class="label">每箱重量(kg)</div>
      <input id="perBox" type="number" placeholder="例如 20">
    </div>

    <div id="kgArea" style="display:none">
      <div class="label">所需千克数(kg)</div>
      <input id="needKg" type="number" placeholder="例如 1000">
    </div>

    <div class="label">每托重量(kg)</div>
    <input id="perPallet" type="number" placeholder="例如 560">

    <div class="label">已出库重量(kg)</div>
    <input id="outedKg" type="number" value="0">

    <div class="label">现有零托重量(kg)</div>
    <div id="zeroList">
      <div class="zero-item">
        <input class="zero-input" type="number" placeholder="零托重量">
        <button class="del" onclick="delLine(this)">×</button>
      </div>
    </div>
    <button class="add-line" onclick="addZeroLine()">+ 增加一行零托</button>

    <button class="btn" onclick="calcOutStock()">计算出库 & 多出箱数</button>

    <div class="res" id="resultStock"></div>
  </div>

  <div id="divCalc" class="tab-content">
    <div class="label">被除数（总数）</div>
    <input id="dividend" type="number" placeholder="例如 1000">

    <div class="label">除数（每份数量）</div>
    <input id="divisor" type="number" placeholder="例如 560">

    <button class="btn" onclick="calcDiv()">计算商和余数</button>

    <div class="res" id="resultDiv"></div>
  </div>
</div>

<script>
//标签切换
document.querySelectorAll('.tab').forEach(t=>{
t.onclick=function(){
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'))
document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'))
this.classList.add('active')
document.getElementById(this.dataset.target).classList.add('active')
}
})

//单选切换
document.querySelectorAll('input[name="type"]').forEach(r=>{
r.onchange=function(){
let isBox=document.querySelector('input[name="type"][value="box"]').checked
document.getElementById('boxArea').style.display=isBox?'block':'none'
document.getElementById('kgArea').style.display=isBox?'none':'block'
}
})

//添加零托
function addZeroLine(){
let d=document.createElement('div')
d.className='zero-item'
d.innerHTML='<input class="zero-input" type="number" placeholder="零托重量"><button class="del" onclick="delLine(this)">×</button>'
document.getElementById('zeroList').appendChild(d)
}
function delLine(btn){
let all=document.querySelectorAll('.zero-item')
if(all.length>1) btn.parentElement.remove()
}

//零托总和
function getZeroSum(){
let s=0
document.querySelectorAll('.zero-input').forEach(i=>s+=Number(i.value)||0)
return s
}

//核心计算
function calcOutStock(){
let isBox=document.querySelector('input[name="type"][value="box"]').checked
let perT=Number(document.getElementById('perPallet').value)||0
let outed=Number(document.getElementById('outedKg').value)||0
let zeroKg=getZeroSum()
let zeroNum=document.querySelectorAll('.zero-input').length

if(!perT){alert('请填写每托重量');return;}

let totalNeed,perB=0
if(isBox){
let box=Number(document.getElementById('box').value)||0
perB=Number(document.getElementById('perBox').value)||0
if(!box||!perB){alert('请填箱数和每箱重量');return;}
totalNeed=box*perB
}else{
totalNeed=Number(document.getElementById('needKg').value)||0
if(!totalNeed){alert('请填所需千克');return;}
}

let still=Math.max(totalNeed-outed,0)
let needFull=Math.max(still-zeroKg,0)
let fullNum=Math.ceil(needFull/perT)
let fullKg=fullNum*perT
let realOut=zeroKg+fullKg
let moreKg=realOut-still
let moreBox=perB>0?(moreKg/perB).toFixed(2):'无需计算'
let totalAll=zeroNum+fullNum

let html=`
总需求：${totalNeed} kg<br>
已出库：${outed} kg<br>
还需补发：${still} kg<br>
——————————<br>
零托：${zeroNum} 托，合计 ${zeroKg} kg<br>
整托：${fullNum} 托，合计 ${fullKg} kg<br>
——————————<br>
零整合计共：${totalAll} 托<br>
本次实际出库：${realOut} kg<br>
<span style="color:red;font-weight:bold">多出：${moreKg} kg = ${moreBox} 箱</span>
`
document.getElementById('resultStock').innerHTML=html
}

//商余
function calcDiv(){
let a=Number(document.getElementById('dividend').value)
let b=Number(document.getElementById('divisor').value)
if(!b){alert('除数不能为0');return;}
let s=Math.floor(a/b),y=a%b
document.getElementById('resultDiv').innerHTML=`${a}÷${b}=${s}…${y}<br>商：${s}<br>余数：${y}`
}
</script>
</body>
</html>
